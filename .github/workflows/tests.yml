name: Unit Tests

# when to run — on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu machine

    steps:
      # 1. checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. install test dependencies from requirements-test.txt
      - name: Install dependencies
        run: pip install -r requirements-test.txt

      # 4. run tests
      - name: Run unit tests
        run: pytest tests/ -v